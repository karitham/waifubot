query character($name: String) {
	Page(page: 1, perPage: 3) {
		characters(search: $name) {
			id
			name {
				full
			}
			description
			siteUrl
			image {
				large
			}
			favourites
		}
	}
}

query charactersRandom($pageNumber: Int, $not_in: [Int]) {
	Page(perPage: 1, page: $pageNumber) {
		characters(sort: FAVOURITES_DESC, id_not_in: $not_in) {
			id
			siteUrl
			image {
				large
			}
			name {
				full
			}
			favourites
			media(perPage: 1, sort: POPULARITY_DESC) {
				nodes {
					title {
						romaji
					}
				}
			}
		}
	}
}

query user($name: String) {
	Page(page: 1, perPage: 3) {
		users(search: $name) {
			id
			name
			about
			siteUrl
			avatar {
				large
			}
			bannerImage
		}
	}
}

query media($name: String, $typ: MediaType) {
	Page(page: 1, perPage: 3) {
		media(search: $name, type: $typ) {
			id
			title {
				romaji
			}
			description
			siteUrl
			coverImage {
				large
				color
			}
			bannerImage
		}
	}
}

query searchMedia($search: String) {
	Page(page: 1, perPage: 10) {
		media(search: $search, sort: POPULARITY_DESC) {
			id
			title {
				romaji
				english
				native
			}
			type
			coverImage {
				large
			}
		}
	}
}

query getMediaCharacters($mediaId: Int!, $page: Int) {
	Media(id: $mediaId) {
		id
		title {
			romaji
			english
		}
		characters(sort: ROLE, page: $page, perPage: 25) {
			edges {
				node {
					id
					name {
						full
					}
					image {
						large
					}
					favourites
				}
			}
			pageInfo {
				hasNextPage
			}
		}
	}
}

query charactersBackfill($page: Int!, $perPage: Int!) {
	Page(page: $page, perPage: $perPage) {
		characters(sort: FAVOURITES_DESC) {
			id
			name {
				full
			}
			image {
				large
			}
			favourites
			media(perPage: 1, sort: POPULARITY_DESC) {
				nodes {
					title {
						romaji
					}
				}
			}
		}
	}
}

query charactersByIds($ids: [Int!]!) {
	Page(page: 1, perPage: 50) {
		characters(id_in: $ids) {
			id
			name {
				full
			}
			image {
				large
			}
			favourites
			media(perPage: 1, sort: POPULARITY_DESC) {
				nodes {
					title {
						romaji
					}
				}
			}
		}
	}
}
